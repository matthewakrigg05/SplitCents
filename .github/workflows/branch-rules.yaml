name: Branch Rules

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-branches:
    runs-on: ubuntu-latest

    steps:
      - name: Validate merge rules
        run: |
          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"

          echo "Base: $BASE"
          echo "Head: $HEAD"

          # master rules
          if [[ "$BASE" == "master" ]]; then
            if [[ "$HEAD" != "dev" && ! "$HEAD" =~ ^hotfix/ ]]; then
              echo "Only dev or hotfix/* can merge into master"
              exit 1
            fi
          fi

          # dev rules
          if [[ "$BASE" == "dev" ]]; then
            if [[ ! "$HEAD" =~ ^feature/ && ! "$HEAD" =~ ^hotfix/ && ! "$HEAD" =~ ^test/ ]]; then
              echo "Only feature/*, hotfix/*, or test/* can merge into dev"
              exit 1
            fi
          fi